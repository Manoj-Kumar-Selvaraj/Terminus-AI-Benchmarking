user_visible_outputs = [
  "/app/out/restart_report.json",
  "/app/out/persistence_audit.log",
]
internal_harness_files = []

[structured_outputs.restart_report]
target = "/app/out/restart_report.json"
format = "json"
instruction_checks = [
  "operator_signature_checksum",
  "schedules",
  "final_time",
  "final_state",
  "integrity_probes",
]

[structured_outputs.persistence_audit]
target = "/app/out/persistence_audit.log"
format = "text"
instruction_checks = [
  "ACCEPTED",
  "REJECTED",
  "SIGNATURE_MISMATCH",
  "/app/work/snapshot.bin",
]
